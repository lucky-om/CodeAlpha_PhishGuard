<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PhishGuard | Secure Redirect</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafgraph/spa-github-pages
        var l = window.location;
        
        // Dynamic detection of path segments to keep
        // If on custom domain phishguard.luckyverse.tech -> 0
        // If on lucky-om.github.io/CodeAlpha_PhishGuard -> 1
        var pathSegmentsToKeep = l.hostname === 'phishguard.luckyverse.tech' ? 0 : 1;

        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
</body>
</html>
