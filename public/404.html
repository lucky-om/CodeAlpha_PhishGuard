<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>PhishGuard | Redirecting...</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages hack 
    // (c) 2016-2024 Rafael Pedicini, MIT License
    // https://github.com/rafgraph/spa-github-pages
    var l = window.location;
    var repoName = 'CodeAlpha_PhishGuard';

    var pathSegmentsToKeep = (l.hostname.indexOf('github.io') !== -1 && l.pathname.indexOf('/' + repoName) !== -1) ? 1 : 0;

    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>

<body>
</body>

</html>
